version: '3.8'

networks:
  isp1_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.1.0/24
          gateway: 172.30.1.254
  isp2_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.2.0/24
          gateway: 172.30.2.254
  lan_a_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.10.0/24
          gateway: 172.20.10.254
  dmz_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.30.0/24
          gateway: 172.20.30.254
  lan_b_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.20.0/24
          gateway: 172.20.20.254

services:
  # ==========================================
  # ISP Cloud & Internet Tester
  # ==========================================
  ISPRouter:
    image: alpine:latest
    container_name: ISPRouter
    privileged: true
    cap_add: [NET_ADMIN]
    networks:
      isp1_net:
        ipv4_address: 172.30.1.100
      isp2_net:
        ipv4_address: 172.30.2.100
    command: /bin/sh -c "echo 1 > /proc/sys/net/ipv4/ip_forward && apk add --no-cache curl && tail -f /dev/null"
    
  # ==========================================
  # HQ (Headquarters) Routers
  # ==========================================
  R1:
    image: networklab7/r1
    build:
      context: ./automation/R1
    container_name: R1
    privileged: true
    cap_add: [NET_ADMIN, SYS_ADMIN]
    networks:
      isp1_net:
        ipv4_address: 172.30.1.1
      lan_a_net:
        ipv4_address: 172.20.10.2
      dmz_net:
        ipv4_address: 172.20.30.2
    volumes:
      - ./automation/R1:/automation
      - ./config/R1:/etc/frr_template
    command: /bin/sh -c "sh /automation/init.sh && tail -f /dev/null"

  R3:
    image: networklab7/r3
    build:
      context: ./automation/R3
    container_name: R3
    privileged: true
    cap_add: [NET_ADMIN, SYS_ADMIN]
    networks:
      isp2_net:
        ipv4_address: 172.30.2.1
      lan_a_net:
        ipv4_address: 172.20.10.3
      dmz_net:
        ipv4_address: 172.20.30.3
    volumes:
      - ./automation/R3:/automation
      - ./config/R3:/etc/frr_template
    command: /bin/sh -c "sh /automation/init.sh && tail -f /dev/null"

  # ==========================================
  # Branch Router
  # ==========================================
  R2:
    image: networklab7/r2
    build:
      context: ./automation/R2
    container_name: R2
    privileged: true
    cap_add: [NET_ADMIN, SYS_ADMIN]
    networks:
      isp1_net:
        ipv4_address: 172.30.1.2
      lan_b_net:
        ipv4_address: 172.20.20.1
    volumes:
      - ./automation/R2:/automation
      - ./config/R2:/etc/frr_template
    command: /bin/sh -c "sh /automation/init.sh && tail -f /dev/null"

  # ==========================================
  # DMZ Zone Servers
  # ==========================================
  LoadBalancer:
    image: nginx:alpine
    container_name: LoadBalancer
    cap_add: [NET_ADMIN]
    networks:
      dmz_net:
        ipv4_address: 172.20.30.10
    volumes:
      - ./automation/LoadBalancer/nginx.conf:/etc/nginx/nginx.conf:ro
    command: /bin/sh -c "ip route replace default via 172.20.30.1 && nginx -g 'daemon off;'"

  ServerA-1:
    image: networklab7/servera
    build: ./automation/ServerA
    container_name: ServerA-1
    cap_add: [NET_ADMIN]
    networks:
      dmz_net:
        ipv4_address: 172.20.30.11
    volumes:
      - ./automation/ServerA:/automation
    command: /bin/sh -c "sleep 5 && ip route replace default via 172.20.30.1 && python /automation/start_services.py Srv1"

  ServerA-2:
    image: networklab7/servera
    build: ./automation/ServerA
    container_name: ServerA-2
    cap_add: [NET_ADMIN]
    networks:
      dmz_net:
        ipv4_address: 172.20.30.12
    volumes:
      - ./automation/ServerA:/automation
    command: /bin/sh -c "sleep 5 && ip route replace default via 172.20.30.1 && python /automation/start_services.py Srv2"

  # ==========================================
  # HQ LAN A Services (Data & Observability)
  # ==========================================
  Postgres:
    image: postgres:15-alpine
    container_name: Postgres
    cap_add: [NET_ADMIN]
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: network_db
    networks:
      lan_a_net:
        ipv4_address: 172.20.10.12
    command: >
      sh -c "ip route replace default via 172.20.10.1 && docker-entrypoint.sh postgres"

  Redis:
    image: redis:alpine
    container_name: Redis
    cap_add: [NET_ADMIN]
    networks:
      lan_a_net:
        ipv4_address: 172.20.10.11
    command: /bin/sh -c "ip route replace default via 172.20.10.1 && redis-server"

  SyslogServer:
    image: syslogserver:latest
    build:
      context: ./automation/Syslog
    container_name: SyslogServer
    cap_add: [NET_ADMIN]
    networks:
      lan_a_net:
        ipv4_address: 172.20.10.100
    volumes:
      - ./automation/Syslog/rsyslog.conf:/etc/rsyslog.conf
      - syslog_data:/var/log/central
    command: /bin/sh -c "ip route replace default via 172.20.10.1 && mkdir -p /var/log/central && rsyslogd -n"

  loki:
    image: grafana/loki:2.9.1
    container_name: loki
    networks:
      lan_a_net:
        ipv4_address: 172.20.10.41
    volumes:
      - ./automation/Observability/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.1
    container_name: promtail
    networks:
      lan_a_net:
        ipv4_address: 172.20.10.42
    volumes:
      - syslog_data:/var/log/syslog
      - ./automation/Observability/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml

  grafana:
    image: grafana/grafana:10.1.5
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      lan_a_net:
        ipv4_address: 172.20.10.43
    volumes:
      - ./automation/Observability/grafana/provisioning:/etc/grafana/provisioning

  ClientA:
    image: networklab7/clienta
    build: ./automation/ClientA
    container_name: ClientA
    cap_add: [NET_ADMIN]
    networks:
      lan_a_net:
        ipv4_address: 172.20.10.50
    command: /bin/sh -c "ip route replace default via 172.20.10.1 && tail -f /dev/null"

  # ==========================================
  # Branch LAN B Services
  # ==========================================
  ServerB:
    image: networklab7/serverb
    build: ./automation/ServerB
    container_name: ServerB
    cap_add: [NET_ADMIN]
    networks:
      lan_b_net:
        ipv4_address: 172.20.20.10
    volumes:
      - ./automation/ServerB:/automation
    command: /bin/sh -c "sleep 5 && ip route replace default via 172.20.20.1 && python /automation/start_services.py BranchSrv"

volumes:
  syslog_data:
